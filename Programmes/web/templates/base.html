<!DOCTYPE html>
<html lang="en" class="{% block html_class %}{% endblock %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Default Title{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='fig/DbCAS_plain.png') }}" alt="DbCAS logo" class="top-logo-main">
        </div>
        <button class="nav-toggle" id="navToggle" type="button" aria-label="Toggle navigation menu" aria-controls="navMenu" aria-expanded="false">
            <span class="nav-toggle__bar"></span>
            <span class="nav-toggle__bar"></span>
            <span class="nav-toggle__bar"></span>
        </button>
        <div class="menu" id="navMenu">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('search') }}">Search</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('contribute') }}">Contribute</a>
            <a href="https://www.splicelab.co.uk/" target="_blank">SpliceLab</a>
        </div>
    </div>
    <div class="main-content">
        {% block searchbar %}
        <div class="searchbar">
            <h1>Search for Alternative Splicing Databases</h1>
            <form method="GET" action="/search" id="search-block">
                <div class="InputContainer">
                    <input placeholder="Search… (default: all databases)" id="searchInput" class="input" name="q" type="text">
                </div>
                <button id="searchButton" type="submit">
                    <span class="search-button__inner">
                        <svg class="search-button__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="11" cy="11" r="7"/>
                            <path d="m20 20-3.5-3.5"/>
                        </svg>
                        <span class="search-button__label">Search</span>
                    </span>
                </button>
            </form>
            <p id="search-example">E.g., mouse, brain, long-read, bulk, single-cell</p>
        </div>
        {% endblock %}
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p class="rights">
            ©️2026 Designed by Splice Lab UK. All rights reserved.
        </p>
        <div class="footer-logo-row">
            <img src="{{ url_for('static', filename='fig/logo_splicelab.png') }}" alt="Logo" class="logo-footer" id="footer-logo">
            <img src="{{ url_for('static', filename='fig/logo_southampton.png') }}" alt="Logo" class="logo-footer">
        </div>
    </div>
    <script>
        (function () {
            const navToggle = document.getElementById("navToggle");
            const navMenu = document.getElementById("navMenu");
            if (!navToggle || !navMenu) return;

            const closeMobileMenu = function () {
                navMenu.classList.remove("is-open");
                navToggle.setAttribute("aria-expanded", "false");
            };

            navToggle.addEventListener("click", function () {
                const isOpen = navMenu.classList.toggle("is-open");
                navToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
            });

            navMenu.querySelectorAll("a").forEach(function (link) {
                link.addEventListener("click", closeMobileMenu);
            });

            window.addEventListener("resize", function () {
                if (window.innerWidth > 768) {
                    closeMobileMenu();
                }
            });
        })();
    </script>
</body>
</html>
